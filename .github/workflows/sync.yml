name: Sincronización de Partidos en Vivo

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de sincronización
        run: |
          curl -X GET "https://cero-a-cero-hu3u.vercel.app/api/cron/sync-live-matches" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail
